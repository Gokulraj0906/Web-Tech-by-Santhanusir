<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>

    <h1> Student Forms</h1>
    <form method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="1" max="100"><br><br>

        <label for="address">Address:</label>
        <textarea id="address" name="address" rows="4" cols="50"></textarea><br><br>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <label for="file">Upload a sample file:</label>
        <input type="file" id="file" name="file"><br><br>

        <input type="submit" value="Submit">
    </form>

</body>

<script>
let form = document.querySelector('form');
form.addEventListener('submit', function(event) {
    event.preventDefault(); // Prevent the default form submission

    // Get form values
    let name = document.getElementById('name').value;
    let email = document.getElementById('email').value;
    let age = document.getElementById('age').value;
    let address = document.getElementById('address').value;
    let password = document.getElementById('password').value;
    let gender = document.getElementById('gender').value;


    if(!name || !email || !password) {
        alert('Please fill in all required fields.');
        return;
    }

    console.log([name,email,age,gender,address,password]);

    // Save form data to localStorage
    const formData = { name, email, age, gender, address, password };
    localStorage.setItem('studentFormData', JSON.stringify(formData));
    cookieStore.set('studentFormData', JSON.stringify(formData), { expires: 7 * 24 * 60 * 60 * 1000 });
   const request = indexedDB.open('StudentFormDB', 1);

request.onupgradeneeded = function(event) {
    const db = event.target.result;
    // Create the object store if it doesn’t exist
    if (!db.objectStoreNames.contains('forms')) {
        db.createObjectStore('forms', { keyPath: 'id', autoIncrement: true });
    }
};

request.onsuccess = function(event) {
    const db = event.target.result;
    const transaction = db.transaction('forms', 'readwrite');
    const store = transaction.objectStore('forms');
    store.add(formData);
};
    alert('Form data saved successfully!');
});

let file = document.getElementById('file');
file.addEventListener('change', function(event) {
    const selectedFile = event.target.files[0];
    if (selectedFile) {
        console.log('Selected file:', selectedFile.name);
    }
});

const fileInput = document.getElementById('file');
if (fileInput.files.length > 0) {
    const blob = fileInput.files[0];
    blob.text().then(text => {
        console.log('File content:', text);
    });
} else {
    console.log('No file selected');
}


console.log(fileInput);
</script>
</html>
