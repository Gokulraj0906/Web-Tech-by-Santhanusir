<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marquee Tags</title>
</head>
<body>
    <h1>This is the Example for marquee Tag</h1>
    <marquee behavior="up" direction="top">
        <h2>Astraeva Groups Was a take Down lockheed Martin</h2>
        <center><img src="Images/Astraeva_groups_logo_2_morden.jpg" alt="image" width="100px" height="100px"></center>
    </marquee>
    <marquee behavior="" direction="left"
    scrollamount="10">

       <img src="https://img1.picmix.com/output/stamp/normal/5/2/4/4/2334425_073bf.gif" alt="img">
    </marquee>
    <marquee behavior="alternate" direction="right"
    scrollamount="2000000000">

       <img src="https://img1.picmix.com/output/stamp/normal/5/2/4/4/2334425_073bf.gif" alt="img">
    </marquee>
</body>
</html>
